name: rufble
description: Personal finance goals tracker. Offline-first, manual deposits only.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  # State management
  flutter_riverpod: ^3.3.1

  # Local DB — offline source of truth
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5

  # Navigation
  go_router: ^17.3.0

  # Network
  dio: ^5.9.2

  # Animations
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  animated_flip_counter: ^0.3.4

  # Glass UI — static elements only (header, FAB, modals)
  liquid_glass_widgets: ^0.15.0

  # Charts
  fl_chart: ^1.2.0

  # Emoji picker
  emoji_picker_flutter: ^4.4.0

  # Haptics
  gaimon: ^1.4.3

  # Notifications
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0

  # Splash
  flutter_native_splash: ^2.4.8

  # Secure auth storage
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

  # Launcher icon generation
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/rufble_icon.png"
    background_color: "#09543D"
    theme_color: "#09543D"
  image_path: "assets/icon/rufble_icon.png"
  adaptive_icon_background: "#09543D"
  adaptive_icon_foreground: "assets/icon/rufble_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/fonts/sf_pro/
    - assets/icon/

  fonts:
    - family: SFProDisplay
      fonts:
        - asset: assets/fonts/sf_pro/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: assets/fonts/sf_pro/SF-Pro-Display-Semibold.otf
          weight: 600
        - asset: assets/fonts/sf_pro/SF-Pro-Display-Bold.otf
          weight: 700

    - family: SFProText
      fonts:
        - asset: assets/fonts/sf_pro/SF-Pro-Text-Regular.otf
          weight: 400
        - asset: assets/fonts/sf_pro/SF-Pro-Text-Medium.otf
          weight: 500
        - asset: assets/fonts/sf_pro/SF-Pro-Text-Semibold.otf
          weight: 600
        - asset: assets/fonts/sf_pro/SF-Pro-Text-Bold.otf
          weight: 700

    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpaceMono-BoldItalic.ttf
          weight: 700
          style: italic

    - family: AppleColorEmoji
      fonts:
        - asset: assets/fonts/AppleColorEmoji.ttc
